<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サンプルページ</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f7f9fc;
      color: #333;
    }
    header {
      margin-bottom: 24px;
    }
    .card {
      padding: 24px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    a {
      color: #2a7ae2;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <h1>ようこそ！</h1>
    <p>これはシンプルなサンプルのWebページです。</p>
  </header>
  <section class="card">
    <h2>このページについて</h2>
    <p>以下のような内容を含んでいます：</p>
    <ul>
      <li>見出し</li>
      <li>段落テキスト</li>
      <li>リンク</li>
    </ul>
    <p>このファイルをブラウザで開くと、Webページとして表示できます。</p>
    <p><a href="https://www.example.com" target="_blank" rel="noopener">外部サイトへのリンク</a></p>
  </section>
</body>
</html>
